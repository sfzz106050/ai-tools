<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气查询 · ZZ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#e0f2fe,#f0f9ff);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.06);text-align:center}
.card h1{font-size:20px;margin-bottom:4px}
.card .sub{font-size:11px;color:#999;margin-bottom:20px}

.search-row{display:flex;gap:8px;margin-bottom:20px}
.search-row input{flex:1;padding:10px 14px;border:1px solid #e5e5e5;border-radius:8px;font-size:14px;font-family:inherit}
.search-row input:focus{outline:none;border-color:#2563eb}
.search-row button{padding:10px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.search-row button:hover{background:#1d4ed8}

/* 天气显示 */
.weather-card{background:linear-gradient(135deg,#e0f2fe,#bae6fd);border-radius:12px;padding:20px;display:none}
.weather-card.show{display:block}
.w-city{font-size:18px;font-weight:700;margin-bottom:4px}
.w-date{font-size:11px;color:#64748b;margin-bottom:12px}
.w-temp{font-size:48px;font-weight:900;color:#1e3a8a}
.w-desc{font-size:14px;color:#475569;margin-top:4px}
.w-detail{display:flex;gap:12px;margin-top:16px;justify-content:center}
.w-detail-item{text-align:center;font-size:12px;color:#64748b}
.w-detail-val{font-weight:700;font-size:15px;color:#334155}

/* 解释区 */
.explain{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-top:16px;text-align:left;font-size:12px;color:#92400e;line-height:1.8;display:none}
.explain.show{display:block}
.explain code{background:#fef3c7;padding:2px 6px;border-radius:3px;font-size:11px}

.loading{color:#999;font-size:13px;padding:20px}
.error{color:#dc2626;font-size:13px;padding:20px}
</style>
</head>
<body>

<div class="card">
  <h1>🌤 天气查询</h1>
  <p class="sub">通过 API 获取实时天气数据</p>

  <div class="search-row">
    <input type="text" id="cityInput" placeholder="输入城市名(英文)..." value="Beijing" onkeydown="if(event.key==='Enter')fetchWeather()">
    <button onclick="fetchWeather()">查询</button>
  </div>

  <div class="weather-card" id="weatherCard">
    <div class="w-city" id="wCity">--</div>
    <div class="w-date" id="wDate">--</div>
    <div class="w-temp" id="wTemp">--</div>
    <div class="w-desc" id="wDesc">--</div>
    <div class="w-detail">
      <div class="w-detail-item">💧 湿度<div class="w-detail-val" id="wHumidity">--</div></div>
      <div class="w-detail-item">🌬 风速<div class="w-detail-val" id="wWind">--</div></div>
    </div>
  </div>

  <div id="loading" class="loading" style="display:none">⏳ 正在请求 API...</div>
  <div id="error" class="error" style="display:none"></div>

  <!-- API 解释 -->
  <div class="explain show" id="explain">
    <strong>📖 这个页面在做什么？</strong><br><br>
    1. 你输入城市 → 点查询<br>
    2. JavaScript 向 <code>https://api.open-meteo.com</code> 发起请求<br>
    3. 服务器返回 JSON 数据（温度、湿度、风速）<br>
    4. 网页把 JSON 解析出来 → 显示<br><br>
    <strong>这就是 API：</strong>网页 ↔ 服务器之间交换数据的方式。<br>
    以后你的球星卡工具就是：<br>
    <code>网页 → 卡淘/eBay API → 最新成交价 → 自动填入预测工具</code>
  </div>
</div>

<script>
// === API 调用 ===
function fetchWeather(){
  var city=document.getElementById('cityInput').value.trim();if(!city)return;

  // 先用 Geocoding API 把城市名转成经纬度
  var geoUrl='https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=zh';

  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('weatherCard').classList.remove('show');
  document.getElementById('explain').classList.remove('show');

  // === 这就是 API 调用: fetch → 等响应 → 解析 JSON ===
  fetch(geoUrl)
    .then(function(response){return response.json()})  // ← JSON 解析
    .then(function(data){
      if(!data.results||data.results.length===0){
        document.getElementById('loading').style.display='none';
        document.getElementById('error').style.display='block';
        document.getElementById('error').textContent='找不到城市，请用英文名(例: Beijing, Tokyo, London)';
        return
      }
      var loc=data.results[0];
      // 有了经纬度 → 请求天气 API
      var weatherUrl='https://api.open-meteo.com/v1/forecast?latitude='+loc.latitude+'&longitude='+loc.longitude+'&current_weather=true&hourly=relativehumidity_2m&timezone=auto';
      return fetch(weatherUrl).then(function(r){return r.json()}).then(function(w){
        showWeather(loc,w)
      })
    })
    .catch(function(err){
      document.getElementById('loading').style.display='none';
      document.getElementById('error').style.display='block';
      document.getElementById('error').textContent='网络请求失败: API 可能暂时不可用。这恰好说明了一个概念——API 依赖外部服务，如果服务挂了，你的页面也拿不到数据。这就是为什么球星卡工具以后需要本地数据库做备份。'
    })
}

function showWeather(loc,data){
  document.getElementById('loading').style.display='none';
  document.getElementById('weatherCard').classList.add('show');
  document.getElementById('explain').classList.add('show');

  var w=data.current_weather;
  document.getElementById('wCity').textContent=loc.name+(loc.country?' ('+loc.country+')':'');
  document.getElementById('wDate').textContent=new Date(w.time).toLocaleString('zh-CN');
  document.getElementById('wTemp').textContent=w.temperature+'°C';
  document.getElementById('wDesc').textContent=weatherDesc(w.weathercode);
  document.getElementById('wHumidity').textContent=(data.hourly?data.hourly.relativehumidity_2m[0]:'--')+'%';
  document.getElementById('wWind').textContent=w.windspeed+' km/h'
}

function weatherDesc(code){
  var map={0:'☀️ 晴',1:'🌤 大部晴',2:'⛅ 多云',3:'☁️ 阴',45:'🌫 雾',51:'🌧 小雨',61:'🌧 中雨',71:'❄️ 小雪',80:'🌧 阵雨',95:'⛈ 雷暴'};
  return map[code]||'天气代码 '+code
}

// 页面加载自动查一次北京
setTimeout(fetchWeather,500);
</script>
</body>
</html>
